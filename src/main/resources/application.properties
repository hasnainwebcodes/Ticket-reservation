spring.application.name=reservation
server.port=${PORT:8080}

# ── PostgreSQL (Clever Cloud injects these automatically) ─────────
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Redis ─────────────────────────────────────────────────────────
spring.data.redis.host=${REDISHOST}
spring.data.redis.port=${REDISPORT}
spring.data.redis.password=${REDISPASSWORD}
spring.data.redis.username=${REDISUSER}
spring.data.redis.ssl.enabled=true
# ── Cache ─────────────────────────────────────────────────────────
spring.cache.type=redis

# ── Mail ──────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Stripe ────────────────────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=INFO
logging.level.system.ticket.reservation=INFO

# ── Swagger ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html

# ── Duffel API ────────────────────────────────────────────────────
duffel.api.url=https://api.duffel.com
duffel.api.token=${DUFFEL_API_TOKEN}
duffel.api.version=v2
