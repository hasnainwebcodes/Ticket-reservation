<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Booking Confirmed')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card p-5 text-center">

                <!-- Success icon -->
                <div class="mb-4">
                    <div class="rounded-circle bg-success d-inline-flex
                                align-items-center justify-content-center"
                         style="width:80px;height:80px;">
                        <i class="bi bi-check-lg text-white" style="font-size:2.5rem;"></i>
                    </div>
                </div>

                <h2 class="fw-bold text-success mb-2">Booking Confirmed!</h2>
                <p class="text-muted mb-4">
                    Your QR boarding pass has been sent to your email
                </p>

                <!-- Booking details (from localStorage display cache) -->
                <div class="card bg-light p-4 text-start mb-4" id="bookingDetails">
                    <div class="row g-3">
                        <div class="col-6">
                            <small class="text-muted">Booking ID</small>
                            <div class="fw-bold" id="bookingId">&mdash;</div>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Flight</small>
                            <div class="fw-bold" id="flightNum">&mdash;</div>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Route</small>
                            <div class="fw-bold" id="route">&mdash;</div>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Passenger</small>
                            <div class="fw-bold" id="passenger">&mdash;</div>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Seat</small>
                            <div class="fw-bold" id="seat">&mdash;</div>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Amount Paid</small>
                            <div class="fw-bold text-success" id="amount">&mdash;</div>
                        </div>
                    </div>
                </div>

                <!-- QR Code (shown only if returned by backend) -->
                <div id="qrSection" class="mb-4" style="display:none;">
                    <p class="text-muted small mb-2">
                        <i class="bi bi-qr-code me-1"></i>Your Boarding Pass QR
                    </p>
                    <img id="qrImage" src="" alt="QR Boarding Pass"
                         class="img-fluid rounded" style="max-width:200px;"/>
                </div>

                <div class="d-grid gap-2">
                    <a href="/my-bookings" class="btn btn-primary py-2 fw-semibold">
                        <i class="bi bi-ticket-perforated me-2"></i>View My Bookings
                    </a>
                    <a href="/search-flights" class="btn btn-outline-primary py-2">
                        <i class="bi bi-search me-2"></i>Book Another Flight
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Read display cache set by book.html after successful booking
const booking = JSON.parse(localStorage.getItem('lastBooking') || '{}');

if (booking.id) {
    document.getElementById('bookingId').textContent  = '#' + booking.id;
    document.getElementById('flightNum').textContent  = (booking.flightNumber || '') + ' — ' + (booking.airline || '');
    document.getElementById('route').textContent      = (booking.origin || '') + ' → ' + (booking.destination || '');
    document.getElementById('passenger').textContent  = booking.passengerName || '—';
    document.getElementById('seat').textContent       = booking.seatNumber    || '—';
    document.getElementById('amount').textContent     = 'PKR ' + (booking.totalPrice?.toLocaleString() || '—');

    if (booking.qrCodeBase64) {
        document.getElementById('qrImage').src         = booking.qrCodeBase64;
        document.getElementById('qrSection').style.display = 'block';
    }

    // Clear so Back button doesn't show stale data
    localStorage.removeItem('lastBooking');
}
</script>

<div th:replace="~{layout :: authScript}"></div>
</body>
</html>
