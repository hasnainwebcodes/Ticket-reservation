<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Search Flights')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="text-center mb-5">
                <h2 class="fw-bold">
                    <i class="bi bi-search text-primary me-2"></i>
                    Search Flights
                </h2>
                <p class="text-muted">
                    Find the best flights at the best prices
                </p>
            </div>

            <div class="card p-4">
                <form action="/flights/results" method="get">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-geo-alt text-primary me-1"></i>
                                From
                            </label>
                            <input type="text" name="origin"
                                   class="form-control"
                                   placeholder="e.g. Karachi"
                                   list="cityList"
                                   required/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-geo text-primary me-1"></i>
                                To
                            </label>
                            <input type="text" name="destination"
                                   class="form-control"
                                   placeholder="e.g. Dubai"
                                   list="cityList"
                                   required/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-calendar text-primary me-1"></i>
                                Departure Date
                            </label>
                            <input type="date" name="date"
                                   id="travelDate"
                                   class="form-control"
                                   required/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-people text-primary me-1"></i>
                                Passengers
                            </label>
                            <select name="adults" class="form-select">
                                <option value="1">1 Adult</option>
                                <option value="2">2 Adults</option>
                                <option value="3">3 Adults</option>
                                <option value="4">4 Adults</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <button type="submit"
                                    class="btn btn-primary w-100 py-3 fw-bold fs-5">
                                <i class="bi bi-search me-2"></i>
                                Search Flights
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- City suggestions -->
            <datalist id="cityList">
                <option value="Karachi"/>
                <option value="Lahore"/>
                <option value="Islamabad"/>
                <option value="Peshawar"/>
                <option value="Quetta"/>
                <option value="Multan"/>
                <option value="Faisalabad"/>
                <option value="Dubai"/>
                <option value="London"/>
                <option value="New York"/>
                <option value="Paris"/>
                <option value="Singapore"/>
                <option value="Bangkok"/>
                <option value="Istanbul"/>
            </datalist>

        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const today = new Date().toISOString().split('T')[0];
    const tomorrow = new Date(Date.now() + 86400000)
                         .toISOString().split('T')[0];
    document.getElementById('travelDate').min   = today;
    document.getElementById('travelDate').value = tomorrow;
</script>
<div th:replace="~{layout :: authScript}"></div>
</body>
</html>
