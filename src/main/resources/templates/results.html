<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Flight Results')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container py-5">

    <!-- Search summary header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">
                <span th:text="${origin}">KHI</span>
                <i class="bi bi-arrow-right text-primary mx-2"></i>
                <span th:text="${destination}">LHE</span>
            </h4>
            <small class="text-muted">
                <i class="bi bi-calendar me-1"></i>
                <span th:text="${date}"></span>
                &bull;
                <span th:text="${flights.size()}">0</span> flights found
            </small>
        </div>
        <a href="/search-flights" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left me-1"></i>New Search
        </a>
    </div>

    <!-- No results -->
    <div th:if="${flights.empty}" class="text-center py-5">
        <i class="bi bi-airplane text-muted" style="font-size:4rem;"></i>
        <h4 class="mt-3 text-muted">No flights found</h4>
        <p class="text-muted">Try a different date or city</p>
        <a href="/search-flights" class="btn btn-primary mt-2">Search Again</a>
    </div>

    <!-- Flight cards -->
    <div th:each="flight : ${flights}" class="card flight-card mb-3 p-4">
        <div class="row align-items-center g-3">

            <!-- Airline info -->
            <div class="col-md-2 text-center">
                <i class="bi bi-airplane text-primary" style="font-size:1.5rem;"></i>
                <div class="fw-bold small mt-1" th:text="${flight.airline}">PIA</div>
                <div class="text-muted" style="font-size:0.75rem;"
                     th:text="${flight.flightNumber}">PK-301</div>
            </div>

            <!-- Departure -->
            <div class="col-md-2 text-center">
                <div class="flight-time"
                     th:text="${#temporals.format(flight.departureTime, 'HH:mm')}">
                    08:00
                </div>
                <div class="flight-code" th:text="${flight.origin}">KHI</div>
            </div>

            <!-- Duration / stops -->
            <div class="col-md-3 text-center">
                <div class="flight-line mx-3"></div>
                <small class="text-muted" th:text="${flight.duration}">1h 30m</small>
                <div class="mt-1">
                    <span class="badge-economy"
                          th:text="${flight.stops == 0 ? 'Non-stop' : flight.stops + ' stop'}">
                        Non-stop
                    </span>
                </div>
            </div>

            <!-- Arrival -->
            <div class="col-md-2 text-center">
                <div class="flight-time"
                     th:text="${#temporals.format(flight.arrivalTime, 'HH:mm')}">
                    09:30
                </div>
                <div class="flight-code" th:text="${flight.destination}">LHE</div>
            </div>

            <!-- Price + Book button -->
            <div class="col-md-3 text-center">
                <div class="text-primary fw-bold fs-4 mb-1">
                    PKR <span th:text="${#numbers.formatInteger(flight.price, 1, 'COMMA')}">
                        8,500
                    </span>
                </div>
                <small class="text-muted d-block mb-1">per person</small>

                <!-- availableSeats comes from FlightSearchDto, not entity -->
                <small class="text-success d-block mb-2">
                    <i class="bi bi-check-circle me-1"></i>
                    <span th:text="${flight.availableSeats}">45</span> seats left
                </small>

                <!--
                    Book Now passes all needed params to PageController /book/{flightNumber}
                    seatId is NOT passed here — seat selection happens on the book page
                -->
                <a th:href="@{/book/{fn}(
                              fn=${flight.flightNumber},
                              price=${flight.price},
                              origin=${flight.origin},
                              destination=${flight.destination},
                              departure=${flight.departureTime},
                              airline=${flight.airline})}"
                   class="btn btn-primary w-100">
                    Book Now
                </a>
            </div>

        </div>
    </div>

</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{layout :: authScript}"></div>
</body>
</html>
