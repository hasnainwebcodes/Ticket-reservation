<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('My Bookings')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">
            <i class="bi bi-ticket-perforated text-primary me-2"></i>
            My Bookings
        </h3>
        <a href="/search-flights" class="btn btn-primary">
            <i class="bi bi-plus me-1"></i>New Booking
        </a>
    </div>

    <!-- Loading state -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">Loading your bookings...</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="text-center py-5" style="display:none;">
        <i class="bi bi-exclamation-circle text-danger" style="font-size:4rem;"></i>
        <h4 class="mt-3 text-muted">Could not load bookings</h4>
        <button class="btn btn-primary mt-3" onclick="loadBookings()">Try Again</button>
    </div>

    <!-- Empty state -->
    <div id="noBookings" class="text-center py-5" style="display:none;">
        <i class="bi bi-ticket text-muted" style="font-size:4rem;"></i>
        <h4 class="mt-3 text-muted">No bookings yet</h4>
        <p class="text-muted">Your confirmed flights will appear here</p>
        <a href="/search-flights" class="btn btn-primary mt-2">
            Book Your First Flight
        </a>
    </div>

    <!-- Bookings list -->
    <div id="bookingsList"></div>

</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function statusBadge(status) {
    const map = {
        CONFIRMED: 'badge-confirmed',
        PENDING:   'badge-pending',
        CANCELLED: 'badge-cancelled',
        REFUNDED:  'badge-cancelled'
    };
    return map[status] || 'badge-pending';
}

async function loadBookings() {
    document.getElementById('loading').style.display    = 'block';
    document.getElementById('errorState').style.display = 'none';
    document.getElementById('noBookings').style.display = 'none';
    document.getElementById('bookingsList').innerHTML   = '';

    try {
        const res = await fetch('/api/bookings/my-bookings', {
            credentials: 'include'   // ← HTTP-only cookie auth
        });

        // Session expired
        if (res.status === 401) {
            window.location.href = '/login';
            return;
        }

        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if (!data.success || !data.data || data.data.length === 0) {
            document.getElementById('noBookings').style.display = 'block';
            return;
        }

        const list = document.getElementById('bookingsList');
        list.innerHTML = data.data.map(b => `
            <div class="card flight-card mb-3 p-4">
                <div class="row align-items-center g-3">

                    <div class="col-md-1 text-center">
                        <i class="bi bi-airplane text-primary fs-3"></i>
                    </div>

                    <div class="col-md-3">
                        <div class="fw-bold">${b.flightNumber} &mdash; ${b.airline}</div>
                        <div class="text-muted small">
                            ${b.origin} &rarr; ${b.destination}
                        </div>
                        <small class="text-muted">
                            <i class="bi bi-calendar me-1"></i>${b.departureTime || ''}
                        </small>
                    </div>

                    <div class="col-md-2">
                        <small class="text-muted d-block">Passenger</small>
                        <span class="fw-semibold">${b.passengerName}</span>
                    </div>

                    <div class="col-md-1">
                        <small class="text-muted d-block">Seat</small>
                        <span class="fw-semibold">${b.seatNumber || '&mdash;'}</span>
                    </div>

                    <div class="col-md-2">
                        <small class="text-muted d-block">Amount</small>
                        <span class="fw-bold text-primary">
                            PKR ${b.totalPrice?.toLocaleString() || '&mdash;'}
                        </span>
                    </div>

                    <div class="col-md-3 text-md-end">
                        <span class="${statusBadge(b.status)} px-3 py-2 rounded">
                            ${b.status}
                        </span>
                        ${b.qrCodeBase64 ? `
                        <div class="mt-2">
                            <img src="${b.qrCodeBase64}" alt="Boarding pass QR"
                                 width="60" class="rounded border"/>
                        </div>` : ''}
                    </div>

                </div>
            </div>
        `).join('');

    } catch (err) {
        document.getElementById('loading').style.display    = 'none';
        document.getElementById('errorState').style.display = 'block';
        console.error('Failed to load bookings:', err);
    }
}

// Run on page load
loadBookings();
</script>

<div th:replace="~{layout :: authScript}"></div>
</body>
</html>
