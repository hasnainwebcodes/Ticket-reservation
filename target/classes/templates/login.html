<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-person-circle text-primary" style="font-size:3rem;"></i>
                    <h3 class="fw-bold mt-2">Welcome Back</h3>
                    <p class="text-muted">Login to your TicketFlow account</p>
                </div>

                <div th:if="${error}" class="alert alert-danger d-flex align-items-center">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <div th:if="${success}" class="alert alert-success d-flex align-items-center">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                </div>

                <div id="alertBox"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" class="form-control"
                                   placeholder="your@email.com" required/>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control"
                                   placeholder="••••••••" required/>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword()">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                            class="btn btn-primary w-100 py-3 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <hr class="my-4"/>
                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="/register" class="text-primary fw-semibold">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const pwd  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.innerHTML = `
        <div class="alert alert-${type} d-flex align-items-center mt-2">
            <i class="bi bi-exclamation-circle me-2"></i>${msg}
        </div>`;
    setTimeout(() => box.innerHTML = '', 5000);
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                email:    document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            })
        });

        const data = await res.json();

        if (data.success) {
            // Store ONLY display data — cookie handles real auth
            localStorage.setItem('user', JSON.stringify({
                firstName: data.data.firstName,
                lastName:  data.data.lastName,
                email:     data.data.email,
                role:      data.data.role
            }));
            window.location.href = '/search-flights';
        } else {
            showAlert(data.message || 'Invalid email or password', 'danger');
        }
    } catch (err) {
        showAlert('Something went wrong. Please try again.', 'danger');
    } finally {
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
        btn.disabled = false;
    }
});
</script>

<div th:replace="~{layout :: authScript}"></div>
</body>
</html>
